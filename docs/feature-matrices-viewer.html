<style>
  :root {

  .controls button { padding: 0.4rem 0.8rem; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
  .controls button:hover { border-color: var(--blue); color: var(--blue); }
  .controls button.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .legend { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 0.3rem; }
  .legend .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .dot-green { background: var(--green); }
  .dot-yellow { background: var(--yellow); }
  .dot-red { background: var(--red); }
  .dot-na { background: var(--na); }
  .matrix-section { margin-bottom: 3rem; }
  .matrix-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .matrix-title .num { background: var(--blue); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }
  .critical { background: var(--red-bg); border: 1px solid var(--red); border-radius: 6px; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; font-size: 0.8rem; color: var(--red); }
  table { width: 100%; border-collapse: collapse; font-size: 0.75rem; table-layout: fixed; }
  thead th { position: sticky; top: 0; background: var(--surface); z-index: 10; padding: 0.5rem 0.3rem; text-align: center; border-bottom: 2px solid var(--border); white-space: nowrap; font-weight: 600; }
  thead th:first-child { text-align: left; width: 180px; min-width: 180px; }
  tbody td { padding: 0.4rem 0.3rem; text-align: center; border-bottom: 1px solid var(--border); }
  tbody td:first-child { text-align: left; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  tbody tr:hover { background: rgba(59, 130, 246, 0.05); }
  .cell-done { background: var(--green-bg); color: var(--green); font-weight: 600; }
  .cell-partial { background: var(--yellow-bg); color: var(--yellow); }
  .cell-missing { background: var(--red-bg); color: var(--red); }
  .cell-na { background: var(--na-bg); color: var(--na); font-style: italic; }
  .score-row td { font-weight: 700; border-top: 2px solid var(--border); background: var(--surface); }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .summary-card .app-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.25rem; }
  .summary-card .score { font-size: 2rem; font-weight: 800; }
  .summary-card .detail { font-size: 0.75rem; color: var(--text-muted); }
  .score-green { color: var(--green); }
  .score-yellow { color: var(--yellow); }
  .score-red { color: var(--red); }
  .bar { height: 6px; border-radius: 3px; background: var(--border); margin-top: 0.5rem; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .priority-section { margin-top: 2rem; }
  .priority-section h3 { font-size: 1rem; margin-bottom: 0.75rem; }
  .p-tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-right: 0.5rem; }
  .p0 { background: var(--red); color: #fff; }
  .p1 { background: var(--yellow); color: #000; }
  .p2 { background: var(--blue); color: #fff; }
  .p3 { background: var(--na); color: #fff; }
  .action-list { list-style: none; }
  .action-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; display: flex; align-items: flex-start; gap: 0.5rem; }

  .overflow-x { overflow-x: auto; }
  @media (max-width: 768px) {

function cellClass(v) {
  if(v===D) return 'cell-done';
  if(v===P) return 'cell-partial';
  if(v===M) return 'cell-missing';
  return 'cell-na';
}
function cellText(v) {
  if(v===D) return '\u2705';
  if(v===P) return '\u26A0\uFE0F';
  if(v===M) return '\u274C';
  return 'N/A';
}

function renderMatrix(m) {
  let html = `<div class="matrix-section" data-matrix="${m.id}">`;
  html += `<div class="matrix-title"><span class="num">${m.id}</span>${m.title}</div>`;
  if(m.critical) html += `<div class="critical">\u26A0\uFE0F CRITICAL: ${m.critical}</div>`;
  html += '<div class="overflow-x"><table><thead><tr><th>Feature</th>';
  APPS.forEach(a => html += `<th>${a}</th>`);
  html += '</tr></thead><tbody>';
  m.rows.forEach(row => {
    html += `<tr><td>${row[0]}</td>`;
    for(let i=1;i<=12;i++) html += `<td class="${cellClass(row[i])}">${cellText(row[i])}</td>`;
    html += '</tr>';
  });
  if(m.scores) {
    html += '<tr class="score-row"><td><strong>Score</strong></td>';
    m.scores.forEach(s => html += `<td><strong>${s}/16</strong></td>`);
    html += '</tr>';
  }
  // Totals row
  let totals = APPS.map((_,i) => {
    let d=0,p=0,mi=0,na=0;
    m.rows.forEach(r => { let v=r[i+1]; if(v===D) d++; else if(v===P) p++; else if(v===M) mi++; else na++; });
    return {d,p,mi,na,total:m.rows.length-na};
  });
  html += '<tr class="score-row"><td><strong>Totals</strong></td>';
  totals.forEach(t => {
    let pct = t.total>0 ? Math.round(t.d/t.total*100) : 0;
    let cls = pct>=70?'score-green':pct>=40?'score-yellow':'score-red';
    html += `<td class="${cls}"><strong>${t.d}/${t.total}</strong><br><small>${pct}%</small></td>`;
  });
  html += '</tr>';
  html += '</tbody></table></div></div>';
  return html;
}

function renderSummary() {
  let appScores = APPS.map((app,i) => {
    let totalD=0, totalAll=0;
    matrices.forEach(m => {
      m.rows.forEach(r => {
        let v = r[i+1];
        if(v!==N) { totalAll++; if(v===D) totalD++; }
      });
    });
    let pct = Math.round(totalD/totalAll*100);
    return {app, totalD, totalAll, pct};
  });
  appScores.sort((a,b) => b.pct - a.pct);

  let html = '<div class="matrix-section"><div class="matrix-title"><span class="num">\u03A3</span>Overall Feature Coverage</div>';
  html += '<div class="summary-grid">';
  appScores.forEach(s => {
    let cls = s.pct>=70?'score-green':s.pct>=40?'score-yellow':'score-red';
    let barCls = s.pct>=70?'var(--green)':s.pct>=40?'var(--yellow)':'var(--red)';
    html += `<div class="summary-card">
      <div class="app-name">${s.app}</div>
      <div class="score ${cls}">${s.pct}%</div>
      <div class="detail">${s.totalD} of ${s.totalAll} features</div>
      <div class="bar"><div class="bar-fill" style="width:${s.pct}%;background:${barCls}"></div></div>
    </div>`;
  });
  html += '</div></div>';
  return html;
}

function renderPriorities() {
  let html = '<h2 style="margin-bottom:1rem">Priority Actions</h2>';
  priorities.forEach(p => {
    html += `<div style="margin-bottom:1.5rem"><h3><span class="p-tag ${p.cls}">${p.level}</span>${p.label}</h3><ul class="action-list">`;
    p.items.forEach(it => {
      html += `<li><span class="app-tag">${it.app}</span>${it.text}</li>`;
    });
    html += '</ul></div>';
  });
  return html;
}

// Render tabs
let tabsHtml = '<button class="active" data-show="all">All</button>';
tabsHtml += '<button data-show="summary">Summary</button>';
matrices.forEach(m => tabsHtml += `<button data-show="${m.id}">${m.id}. ${m.title.split(' ').slice(0,2).join(' ')}</button>`);
document.getElementById('matrixTabs').innerHTML = tabsHtml;

// Render all matrices
let allHtml = '';
matrices.forEach(m => allHtml += renderMatrix(m));
allHtml += renderSummary();
document.getElementById('matrices').innerHTML = allHtml;
document.getElementById('priorities').innerHTML = renderPriorities();

// Tab switching
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let show = btn.dataset.show;
    document.querySelectorAll('.matrix-section').forEach(s => {
      if(show==='all') s.style.display='';
      else if(show==='summary') s.style.display = s.querySelector('.summary-grid') ? '' : 'none';
      else s.style.display = s.dataset.matrix==show ? '' : 'none';
    });
    document.getElementById('priorities').style.display = (show==='all'||show==='summary') ? '' : 'none';
  });
});
</script>
</body>
</html>
